name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  # ============================================================================
  # LINT & TEST
  # ============================================================================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          echo "🧪 Running test suite..."
          pytest tests/ -v --tb=short
          echo "✅ All tests passed"

      - name: Lint with Ruff
        run: |
          echo "🔍 Linting code..."
          ruff check docs/ --exit-zero || true
          echo "✅ Linting complete"
        continue-on-error: true
